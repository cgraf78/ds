name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on ds
        run: shellcheck bin/ds
      - name: Run shellcheck on plugins
        run: shellcheck -x lib/plugins/*.sh
      - name: Run shellcheck on tests
        run: shellcheck -x tests/ds-test tests/test-helpers.sh

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: bash tests/ds-test
